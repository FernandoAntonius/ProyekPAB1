name: gamepedia
description: "GamePedia"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shared_preferences: ^2.2.2
  encrypt: ^5.0.2
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  geolocator: ^14.0.2
  image_picker: ^1.2.2
  flutter_launcher_icons: ^0.14.4
  flutter_image_compress: ^2.4.0
  intl: ^0.20.2
  url_launcher: ^6.3.2
  http: ^1.6.0
  shimmer: ^3.0.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0
  provider: ^6.1.5+1
  cloud_firestore: ^6.4.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - images/

  fonts:
    - family: Quicksand
      fonts:
        - asset: fonts/Quicksand-Regular.ttf
        - asset: fonts/Quicksand-Medium.ttf
        - asset: fonts/Quicksand-Bold.ttf
          weight: 700
